name: Update README from Supabase

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run update script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          README_PATH: README.md
        run: node scripts/update-readme.mjs

      - name: Commit changes
        run: |
          git config user.name "readme-bot"
          git config user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update dotfiles list from Supabase"
          git push
